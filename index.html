<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v3.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:10;
background:#151925;
padding:12px;
text-align:center;
font-weight:bold;
}

/* LAYOUT */
.container{
display:flex;
flex-direction:column;
gap:12px;
padding:10px;
max-width:100%;
}

/* CARDS */
.card{
background:#1b2130;
padding:12px;
border-radius:10px;
border:1px solid #2a3440;
}

/* TEXT */
h3{
margin:6px 0;
color:#00d4ff;
font-size:14px;
}

/* INPUTS */
input,select,button{
width:100%;
padding:12px;
margin:4px 0;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button.big{
padding:14px;
font-size:15px;
}

button.green{
background:#22c55e;
color:#000;
}

button.red{
background:#ef4444;
color:#fff;
}

/* PROPERTY LINKS */
.links{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.linkbtn{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
background:#0e141b;
border:1px solid #2a3440;
font-weight:bold;
}

/* REHAB ROW */
.rehabRow{
display:flex;
align-items:center;
gap:8px;
margin:6px 0;
font-size:12px;
}

.rehabRow span{
flex:1;
}

/* CHAT */
#aiBox{
position:fixed;
bottom:70px;
right:10px;
width:280px;
height:320px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:11px;
}

#msg{
padding:8px;
border:none;
width:100%;
}

/* AI BUTTON */
#aiBtn{
position:fixed;
bottom:10px;
right:10px;
width:55px;
height:55px;
border-radius:50%;
background:#00d4ff;
border:none;
font-size:18px;
z-index:999;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#intro h2{
color:#00d4ff;
}
</style>
</head>

<body>

<!-- INTRO AI -->
<div id="intro">
<h2>RO'Lyfe OS</h2>
<p>Initializing underwriting engine...</p>
</div>

<header>RO'Lyfe DEAL DESK OS v3.1 — INSTITUTIONAL FLOW ENGINE</header>

<div class="container">

<!-- APPLICATION -->
<div class="card">
<h3>📥 Step 1: Loan Application (REQUIRED)</h3>

<a href="https://form.jotform.com/261416399941062">
<button class="big green">Open Application</button>
</a>

<a href="https://form.jotform.com/253154859148062">
<button class="big">Upload Documents</button>
</a>

<p style="font-size:11px;opacity:.7">
Application must be completed before underwriting + rehab approval.
</p>
</div>

<!-- DEAL -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<button onclick="buildLinks()">🔗 Generate Property Links</button>

<div id="links" class="links"></div>
</div>

<!-- REHAB -->
<div class="card">
<h3>🛠 COGO Rehab Checklist (LIVE CALC)</h3>

<div id="rehab"></div>

<button onclick="calc()" class="big">Calculate Rehab</button>

<div id="rehabOut" style="white-space:pre-wrap;font-size:11px;background:#0e141b;padding:10px;border-radius:8px;margin-top:8px"></div>
</div>

<!-- STRATEGY -->
<div class="card">
<h3>📊 Capital Stack</h3>

<button onclick="run()" class="big">Run Underwriting</button>

<div id="strategy" style="font-size:11px;white-space:pre-wrap;background:#0e141b;padding:10px;border-radius:8px"></div>
</div>

<!-- EXPORT -->
<div class="card">
<h3>⚙️ Export</h3>

<button onclick="emailDeal()" class="big">📧 Email Deal Packet</button>
<button onclick="window.print()" class="big">📄 Print / PDF</button>
<button onclick="reset()" class="red big">RESET</button>
</div>

</div>

<!-- AI -->
<button id="aiBtn" onclick="toggleAI()">🤖</button>

<div id="aiBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter')ask()">
</div>

<script>

/* INTRO AUTO CLOSE */
setTimeout(()=>document.getElementById("intro").style.display="none",5000);

/* REHAB LIST */
const items=[
["Roofing",12000],
["Kitchen",20000],
["Plumbing",18000],
["HVAC",13000],
["Windows",8000],
["Siding",8000],
["Drywall",15000],
["Electrical",8000],
["Framing",15000],
["Flooring",15000],
["Painting",3000],
["Permit Fees",3000],
["Dumpster",2000],
["Structural",15000],
["Water Heater",1300],
["Stairs",1000]
];

let selected=[];

/* BUILD */
function build(){
let html="";
items.forEach((i,index)=>{
html+=`
<div class="rehabRow">
<input type="checkbox" onchange="toggle(${index})">
<span>${i[0]}</span>
<input id="c${index}" type="number" value="${i[1]}">
</div>`;
});
rehab.innerHTML=html;
}
build();

/* TOGGLE */
function toggle(i){
selected.includes(i)
? selected=selected.filter(x=>x!==i)
: selected.push(i);
}

/* CALC */
function calc(){
let total=0;
let out="";

selected.forEach(i=>{
let v=+document.getElementById("c"+i).value||0;
total+=v;
out+=items[i][0]+" — $"+v+"\n";
});

rehabOut.innerText="TOTAL: $"+total+"\n\n"+out;
return total;
}

/* LINKS BIG BUTTONS */
function buildLinks(){
let a=encodeURIComponent(address.value);

links.innerHTML=`
<a class="linkbtn" target="_blank" href="https://www.redfin.com/search?q=${a}">🔴 Redfin</a>
<a class="linkbtn" target="_blank" href="https://www.zillow.com/homes/${a}">🏠 Zillow</a>
<a class="linkbtn" target="_blank" href="https://www.google.com/search?q=${a}">🌐 Google</a>
`;
}

/* UNDERWRITING */
function run(){
let p=+purchase.value||0;
let a=+arv.value||0;
let r=calc();

strategy.innerText=
`Cash (65%): $${(a*0.65).toFixed(0)}
Refi (70%): $${(a*0.70).toFixed(0)}
Seller (75%): $${(a*0.75).toFixed(0)}

All-in: $${(p+r)}
Spread: $${(a-(p+r))}`;
}

/* EMAIL */
function emailDeal(){
window.location.href=
`mailto:richman@rootoflyfe.com?subject=Deal Packet&body=${encodeURIComponent(rehabOut.innerText)}`;
}

/* RESET */
function reset(){
location.reload();
}

/* AI */
function toggleAI(){
aiBox.style.display = aiBox.style.display==="flex"?"none":"flex";
aiBox.style.flexDirection="column";
}

function ask(){
let q=msg.value.toLowerCase();
chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let r="Ask about deals, rehab, or spreads.";

if(q.includes("rehab")) r="Rehab = profit control.";
if(q.includes("deal")) r="Spread decides everything.";
if(q.includes("money")) r="Money follows structure.";

chat.innerHTML+=`<div><b>Jamal:</b> ${r}</div>`;
msg.value="";
chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
