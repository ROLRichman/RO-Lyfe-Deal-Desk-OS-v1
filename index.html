<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f1115;color:#fff;}
header{padding:14px;background:#151925;text-align:center;font-weight:bold;position:sticky;top:0}

.container{display:flex;flex-direction:column;gap:12px;padding:12px}

.card{background:#1b2130;padding:12px;border-radius:10px}

input,select,button{width:100%;padding:10px;margin:4px 0;border:none;border-radius:6px}

button{background:#00d4ff;font-weight:bold;cursor:pointer}
button.danger{background:#ff4d4d;color:#fff}

.scroll{overflow-x:auto}
table{min-width:900px;font-size:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #333;white-space:nowrap}

.green{color:#00ff99}
.yellow{color:#ffcc00}
.red{color:#ff4d4d}

.rehabBox{background:#0e141b;padding:10px;border-radius:8px;margin-top:8px;font-size:11px}

a{color:#6ee7c9}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v1.5 — FULL MONEY ENGINE</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="buildLinks()">🔗 Generate Property Links</button>

<div id="links"></div>

</div>

<!-- COGO REHAB -->
<div class="card">
<h3>🛠 Rehab Scope (VISIBLE + REQUIRED)</h3>

<textarea id="rehabInput" rows="6" placeholder="Enter rehab items line by line:
Roof 12000
Kitchen 20000
Plumbing 18000"></textarea>

<button onclick="calcRehab()">Calculate Rehab</button>

<div id="rehabOut" class="rehabBox">No rehab entered</div>
</div>

<!-- 3 TIER STRATEGY -->
<div class="card">
<h3>📊 3-Tier Strategy Engine</h3>

<button onclick="calcStrategy()">Run Strategy</button>

<div id="strategy"></div>
</div>

<!-- ACTIONS -->
<div class="card">
<h3>⚙️ Actions</h3>

<button onclick="generatePacket()">📄 Investor Packet</button>
<button onclick="emailDeal()">📧 Email Deal</button>
<button onclick="downloadPDF()">⬇ PDF</button>
<button class="danger" onclick="resetAll()">RESET</button>
</div>

</div>

<script>

let rehabTotal = 0;

/* REHAB CALC (VISIBLE FIX) */
function calcRehab(){

let lines = rehabInput.value.trim().split("\n");
let html = "";
rehabTotal = 0;

lines.forEach(l=>{
let parts = l.split(" ");
let cost = parseFloat(parts.pop())||0;
let name = parts.join(" ");

if(name){
rehabTotal += cost;
html += `<div>${name} — $${cost}</div>`;
}
});

rehabOut.innerHTML = `
<b>Total Rehab:</b> $${rehabTotal}<br><br>
${html}
`;
}

/* PROPERTY LINKS (REAL VALUE ADD) */
function buildLinks(){
let a = encodeURIComponent(address.value);

links.innerHTML = `
<a target="_blank" href="https://www.redfin.com/search?q=${a}">🔴 Redfin</a><br>
<a target="_blank" href="https://www.zillow.com/homes/${a}_rb/">🏠 Zillow</a><br>
<a target="_blank" href="https://www.google.com/search?q=${a}">🌐 Google Search</a>
`;
}

/* STRATEGY ENGINE */
function calcStrategy(){

let p = parseFloat(purchase.value)||0;
let a = parseFloat(arv.value)||0;

let cash = a * 0.65;
let refi = a * 0.70;
let seller = a * 0.75;

strategy.innerHTML = `
<b>Cash Offer (65% ARV):</b> $${cash.toFixed(0)}<br>
<b>Refi Position (70% ARV):</b> $${refi.toFixed(0)}<br>
<b>Seller Finance Target (75% ARV):</b> $${seller.toFixed(0)}<br><br>

<b>All-In Check:</b> ${(p + rehabTotal).toFixed(0)}<br>
<b>ARV Spread:</b> ${(a - (p + rehabTotal)).toFixed(0)}
`;
}

/* EMAIL EXPORT */
function emailDeal(){

let body = `
RO'LYFE DEAL SNAPSHOT

Address: ${address.value}
Purchase: ${purchase.value}
ARV: ${arv.value}

REHAB TOTAL: ${rehabTotal}

Cash Offer (65%): ${(arv.value*0.65)}
Refi (70%): ${(arv.value*0.70)}
Seller Finance (75%): ${(arv.value*0.75)}

Generated by RO'Lyfe OS
`;

window.location.href =
`mailto:richman@rootoflyfe.com?subject=Deal Snapshot&body=${encodeURIComponent(body)}`;
}

/* PACKET */
function generatePacket(){
alert("Investor packet ready — use Email Deal or PDF Export");
}

/* PDF */
function downloadPDF(){
let w = window.open();
w.document.write(`
<h2>RO'Lyfe Deal Packet</h2>
<p>${address.value}</p>
<p>Purchase: ${purchase.value}</p>
<p>ARV: ${arv.value}</p>
<p>Rehab: ${rehabTotal}</p>
`);
w.print();
}

/* RESET */
function resetAll(){
if(confirm("Reset everything?")){
location.reload();
}
}

</script>

</body>
</html>
