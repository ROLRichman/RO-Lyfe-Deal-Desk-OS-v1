<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
padding:14px;
background:#151925;
text-align:center;
font-weight:bold;
font-size:14px;
position:sticky;
top:0;
z-index:10;
}

/* MOBILE GRID */
.container{
display:flex;
flex-direction:column;
gap:12px;
padding:10px;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
width:100%;
box-sizing:border-box;
}

h2{
font-size:13px;
color:#00d4ff;
margin:6px 0;
}

input, select, button{
width:100%;
padding:10px;
margin:4px 0;
border:none;
border-radius:6px;
font-size:13px;
box-sizing:border-box;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button.danger{
background:#ff4d4d;
color:#fff;
}

.scroll{
overflow-x:auto;
}

table{
min-width:900px;
border-collapse:collapse;
font-size:10px;
}

th,td{
padding:6px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.green{color:#00ff99;}
.yellow{color:#ffcc00;}
.red{color:#ff4d4d;}

/* JAMAL */
#jamalBtn{
position:fixed;
bottom:16px;
right:16px;
width:56px;
height:56px;
border-radius:50%;
background:#00d4ff;
border:none;
font-size:22px;
z-index:999;
}

#jamalBox{
position:fixed;
bottom:80px;
right:16px;
width:90%;
max-width:320px;
height:360px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:12px;
}

#msg{
padding:10px;
border:none;
font-size:12px;
}

.small{font-size:11px;opacity:0.7}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v1.4 — MOBILE MONEY ENGINE</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h2>📍 Deal Intake</h2>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Real Estate Bees</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Private Lender</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="addDeal()">Add Deal</button>
</div>

<!-- COGO REHAB -->
<div class="card">
<h2>🛠 COGO Rehab Engine</h2>

<select id="cat" onchange="loadItems()">
<option value="">Select Category</option>
<option>Structural</option>
<option>Exterior</option>
<option>Roofing</option>
<option>Electrical</option>
<option>Plumbing</option>
<option>HVAC</option>
<option>Kitchen</option>
<option>Bathrooms</option>
<option>Flooring</option>
<option>Interior</option>
<option>Site Work</option>
</select>

<select id="item"></select>

<input id="cost" placeholder="Cost">

<button onclick="addRehabItem()">Add Rehab Item</button>

<p><b>Rehab Total:</b> $<span id="rehabTotal">0</span></p>
</div>

<!-- ACTIONS -->
<div class="card">
<h2>⚙️ Actions</h2>

<button onclick="generatePacket()">📄 Investor Packet</button>
<button onclick="downloadPDF()">⬇️ PDF Report</button>
<button onclick="emailBlast()">📧 Email Blast</button>
<button onclick="resetAll()" class="danger">RESET</button>
</div>

<!-- PIPELINE -->
<div class="card">
<h2>📊 Pipeline</h2>

<div class="scroll">
<table>
<thead>
<tr>
<th>Address</th>
<th>Lead</th>
<th>Stage</th>
<th>Buy</th>
<th>ARV</th>
<th>Rehab</th>
<th>Spread</th>
<th>Status</th>
</tr>
</thead>
<tbody id="pipe"></tbody>
</table>
</div>
</div>

</div>

<!-- JAMAL -->
<button id="jamalBtn" onclick="toggleJamal()">🤖</button>

<div id="jamalBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter') askJamal()">
</div>

<script>

let deals = JSON.parse(localStorage.getItem("deals") || "[]");
let rehabTotal = 0;
let rehabItems = [];

/* COGO STRUCTURE */
const cogo = {
Structural:["Foundation","Framing"],
Exterior:["Siding","Windows","Doors"],
Roofing:["Roof Replacement"],
Electrical:["Rough","Panel","Fixtures"],
Plumbing:["Rough","Fixtures","Water Heater"],
HVAC:["Furnace","AC","Ductwork"],
Kitchen:["Cabinets","Countertops","Appliances"],
Bathrooms:["Tile","Vanity","Toilet"],
Flooring:["Wood","Vinyl","Carpet"],
Interior:["Drywall","Paint","Trim"],
"Site Work":["Demolition","Cleanup"]
};

/* LOAD ITEMS */
function loadItems(){
item.innerHTML="";
(cogo[cat.value]||[]).forEach(i=>{
let o=document.createElement("option");
o.value=i;
o.text=i;
item.appendChild(o);
});
}

/* ADD REHAB */
function addRehabItem(){
let i=item.value;
let c=parseFloat(cost.value)||0;
if(!i||c<=0)return alert("Missing rehab data");

rehabItems.push({i,c});
rehabTotal+=c;
rehabTotalEl.innerText=rehabTotal;
cost.value="";
}

/* ADD DEAL */
function addDeal(){

let p=parseFloat(purchase.value)||0;
let a=parseFloat(arv.value)||0;

if(!address.value||!p||!a) return alert("Missing fields");

deals.push({
address:address.value,
lead:lead.value,
stage:stage.value,
purchase:p,
arv:a,
rehab:rehabTotal
});

localStorage.setItem("deals",JSON.stringify(deals));

render();
}

/* PIPELINE */
function render(){
let html="";

deals.forEach(d=>{
let total=d.purchase+d.rehab;
let spread=d.arv-total;

let status=spread>30000?"STRONG":spread>10000?"MID":"KILL";
let color=spread>30000?"green":spread>10000?"yellow":"red";

html+=`
<tr>
<td>${d.address}</td>
<td>${d.lead}</td>
<td>${d.stage}</td>
<td>$${d.purchase}</td>
<td>$${d.arv}</td>
<td>$${d.rehab}</td>
<td>$${spread}</td>
<td class="${color}">${status}</td>
</tr>`;
});

pipe.innerHTML=html;
}

/* EMAIL */
function emailBlast(){
let body="RO'Lyfe DEAL REPORT\n\n";

deals.forEach(d=>{
body+=`${d.address} | Buy:${d.purchase} | ARV:${d.arv} | Rehab:${d.rehab}\n`;
});

window.location.href=
`mailto:?subject=RO'Lyfe Deal Report&body=${encodeURIComponent(body)}`;
}

/* PDF */
function downloadPDF(){
let w=window.open();
w.document.write("<h2>RO'Lyfe Report</h2>");

deals.forEach(d=>{
w.document.write(`<p>${d.address} | ${d.purchase} | ${d.arv} | ${d.rehab}</p>`);
});

w.print();
}

/* RESET */
function resetAll(){
if(confirm("Reset everything?")){
localStorage.clear();
location.reload();
}
}

/* JAMAL */
function toggleJamal(){
jamalBox.style.display=jamalBox.style.display==="flex"?"none":"flex";
jamalBox.style.flexDirection="column";
}

function askJamal(){
let q=msg.value.toLowerCase();
chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let r="Ask about deals, rehab, or spreads.";

if(q.includes("deal")) r="Focus on spread above 30k.";
if(q.includes("rehab")) r="Control rehab = control profit.";
if(q.includes("money")) r="Money follows structure, not emotion.";

chat.innerHTML+=`<div><b>Jamal:</b> ${r}</div>`;
msg.value="";
chat.scrollTop=chat.scrollHeight;
}

render();

</script>

</body>
</html>
