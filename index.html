<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
padding:14px;
background:#151925;
text-align:center;
font-weight:bold;
font-size:14px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:12px;
padding:12px;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
flex:1;
min-width:300px;
}

h2{
font-size:13px;
color:#00d4ff;
margin-bottom:8px;
}

input, select, button{
width:100%;
padding:8px;
margin:4px 0;
border:none;
border-radius:6px;
font-size:12px;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

.small{font-size:11px;opacity:0.7}

/* PIPELINE */
.scroll{
overflow-x:auto;
white-space:nowrap;
border:1px solid #222;
border-radius:8px;
}

table{
min-width:1200px;
border-collapse:collapse;
font-size:10px;
}

th,td{
padding:5px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.green{color:#00ff99;}
.yellow{color:#ffcc00;}
.red{color:#ff4d4d;}

/* JAMAL */
#jamalBtn{
position:fixed;
bottom:18px;
right:18px;
width:55px;
height:55px;
border-radius:50%;
background:#00d4ff;
border:none;
font-size:22px;
cursor:pointer;
z-index:999;
}

#jamalBox{
position:fixed;
bottom:80px;
right:18px;
width:300px;
height:350px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:12px;
}

#msg{
width:100%;
padding:8px;
border:none;
font-size:12px;
}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS — MONEY ROOM v1.1</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h2>📍 Deal Intake</h2>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV Estimate">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Real Estate Bees</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Private Lender</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="addDeal()">Add Deal</button>
</div>

<!-- ACTIONS -->
<div class="card">
<h2>⚙️ Actions</h2>

<button onclick="sendEmail('richman@rootoflyfe.com')">Email Richman</button>
<button onclick="sendEmail('richprivatelender@gmail.com')">Email Lender</button>

<button onclick="resetAll()" style="background:#ff4d4d;">RESET DEALS</button>
</div>

<!-- REHAB COGO -->
<div class="card">
<h2>🛠 COGO Rehab Scope (REQUIRED)</h2>

<div id="rehab"></div>
<p><b>Total Rehab:</b> $<span id="rehabTotal">0</span></p>

<button onclick="calcRehab()">Calculate Rehab</button>
</div>

<!-- ANALYSIS -->
<div class="card">
<h2>🧠 Deal Analysis</h2>
<p id="analysis">Run a deal to analyze</p>
</div>

<!-- PIPELINE -->
<div class="card" style="flex-basis:100%">
<h2>📊 Pipeline</h2>

<div class="scroll">
<table>
<thead>
<tr>
<th>Address</th>
<th>Lead</th>
<th>Stage</th>
<th>Buy</th>
<th>ARV</th>
<th>Rehab</th>
<th>Total</th>
<th>Spread</th>
<th>Status</th>
</tr>
</thead>
<tbody id="pipe"></tbody>
</table>
</div>

</div>

</div>

<!-- JAMAL -->
<button id="jamalBtn" onclick="toggleJamal()">🤖</button>

<div id="jamalBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter') askJamal()">
</div>

<script>

let deals = JSON.parse(localStorage.getItem("deals") || "[]");

/* CLEAN BAD DATA */
deals = deals.filter(d => d && d.address && d.address !== "undefined");

/* COGO REHAB CORE (MANDATORY SYSTEM) */
const rehabItems = [
["Architect",0],
["Asphalt & Paving",0],
["Basement",0],
["Bathroom Tile",0],
["Bathroom Vanity",0],
["Carpentry Rough",0],
["Demolition",0],
["Drywall",15000],
["Dumpster",2000],
["Electrical Labor",8000],
["Flooring",15000],
["Framing",15000],
["HVAC",13000],
["Interior Paint",3000],
["Kitchen",20000],
["Lighting",1200],
["Permit Fees",3000],
["Plumbing",18000],
["Roofing",12000],
["Siding",8000],
["Stairs",1000],
["Structural",15000],
["Windows",8000]
];

/* BUILD REHAB UI */
function buildRehab(){
let html="";
rehabItems.forEach((r,i)=>{
html+=`
<div>
<small>${r[0]}</small>
<input type="number" id="r${i}" value="${r[1]}">
</div>`;
});
document.getElementById("rehab").innerHTML=html;
}
buildRehab();

/* CALC REHAB */
function calcRehab(){
let total=0;
rehabItems.forEach((r,i)=>{
total += parseFloat(document.getElementById("r"+i).value)||0;
});
document.getElementById("rehabTotal").innerText=total;
return total;
}

/* ADD DEAL */
function addDeal(){

let r = calcRehab();

let d = {
address:document.getElementById("address").value,
lead:document.getElementById("lead").value,
stage:document.getElementById("stage").value,
purchase:parseFloat(document.getElementById("purchase").value)||0,
arv:parseFloat(document.getElementById("arv").value)||0,
rehab:r
};

if(!d.address || !d.purchase || !d.arv){
alert("Missing required fields");
return;
}

deals.push(d);
localStorage.setItem("deals",JSON.stringify(deals));

render();
}

/* PIPELINE */
function render(){

let html="";

deals.forEach(d=>{

let total=d.purchase+d.rehab;
let spread=d.arv-total;

let status =
spread>30000?"ASSIGNABLE":
spread>10000?"REVIEW":"KILL";

let color =
spread>30000?"green":
spread>10000?"yellow":"red";

html+=`
<tr>
<td>${d.address}</td>
<td>${d.lead}</td>
<td>${d.stage}</td>
<td>$${d.purchase}</td>
<td>$${d.arv}</td>
<td>$${d.rehab}</td>
<td>$${total}</td>
<td>$${spread}</td>
<td class="${color}">${status}</td>
</tr>`;
});

document.getElementById("pipe").innerHTML=html;
}

/* EMAIL */
function sendEmail(email){
window.location.href =
`mailto:${email}?subject=RO'Lyfe Deal&body=` +
encodeURIComponent(JSON.stringify(deals,null,2));
}

/* RESET */
function resetAll(){
if(!confirm("Reset all deals?")) return;
localStorage.removeItem("deals");
deals=[];
render();
}

/* JAMAL AI */
function toggleJamal(){
let b=document.getElementById("jamalBox");
b.style.display=b.style.display==="flex"?"none":"flex";
b.style.flexDirection="column";
}

function askJamal(){
let msg=document.getElementById("msg");
let chat=document.getElementById("chat");

let q=msg.value.toLowerCase();
msg.value="";

chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let reply="";

if(q.includes("deal")){
reply="Focus on spread + rehab control. 30k+ is strong.";
}
else if(q.includes("rehab")){
reply="COGO rehab controls profit. Never skip it.";
}
else if(q.includes("good")){
reply="Good deal = clean rehab + strong ARV spread.";
}
else{
reply="I’m Jamal. Ask about deals, rehab, or strategy.";
}

chat.innerHTML+=`<div><b>Jamal:</b> ${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
}

render();

</script>

</body>
  </html>
