<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
padding:14px;
background:#151925;
text-align:center;
font-weight:bold;
font-size:14px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:12px;
padding:12px;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
flex:1;
min-width:300px;
}

h2{
font-size:13px;
color:#00d4ff;
}

input, select, button{
width:100%;
padding:8px;
margin:4px 0;
border:none;
border-radius:6px;
font-size:12px;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

.scroll{
overflow-x:auto;
white-space:nowrap;
border:1px solid #222;
border-radius:8px;
}

table{
min-width:1200px;
border-collapse:collapse;
font-size:10px;
}

th,td{
padding:5px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.green{color:#00ff99;}
.yellow{color:#ffcc00;}
.red{color:#ff4d4d;}

#jamalBtn{
position:fixed;
bottom:18px;
right:18px;
width:55px;
height:55px;
border-radius:50%;
background:#00d4ff;
border:none;
font-size:22px;
cursor:pointer;
z-index:999;
}

#jamalBox{
position:fixed;
bottom:80px;
right:18px;
width:300px;
height:350px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{flex:1;overflow:auto;padding:8px;font-size:12px;}
#msg{width:100%;padding:8px;border:none;font-size:12px;}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v1.2 — LIVE EMAIL AUTOMATION ENGINE</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h2>📍 Deal Intake</h2>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Real Estate Bees</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Private Lender</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="addDeal()">Add Deal</button>
</div>

<!-- ACTIONS -->
<div class="card">
<h2>⚙️ Automation Center</h2>

<button onclick="emailBlast('investor')">📧 Investor Rehab Blast</button>
<button onclick="emailBlast('lender')">🏦 Lender Deal Pack</button>
<button onclick="emailBlast('self')">📨 Send Report To Me</button>

<button onclick="resetAll()" style="background:#ff4d4d;">RESET CRM</button>
</div>

<!-- PIPELINE -->
<div class="card" style="flex-basis:100%">
<h2>📊 Pipeline</h2>

<div class="scroll">
<table>
<thead>
<tr>
<th>Address</th>
<th>Lead</th>
<th>Stage</th>
<th>Buy</th>
<th>ARV</th>
<th>Rehab</th>
<th>Total</th>
<th>Spread</th>
<th>Status</th>
</tr>
</thead>
<tbody id="pipe"></tbody>
</table>
</div>

</div>

</div>

<!-- JAMAL -->
<button id="jamalBtn" onclick="toggleJamal()">🤖</button>

<div id="jamalBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter') askJamal()">
</div>

<script>

let deals = JSON.parse(localStorage.getItem("deals") || "[]");

/* ADD DEAL */
function addDeal(){

let d={
address:address.value,
lead:lead.value,
stage:stage.value,
purchase:+purchase.value,
arv:+arv.value,
rehab:25000
};

if(!d.address || !d.purchase || !d.arv){
alert("Missing fields");
return;
}

deals.push(d);
localStorage.setItem("deals",JSON.stringify(deals));
render();
}

/* PIPELINE */
function render(){

let html="";

deals.forEach(d=>{

let total=d.purchase+d.rehab;
let spread=d.arv-total;

let status =
spread>30000?"ASSIGNABLE":
spread>10000?"REVIEW":"KILL";

let color =
spread>30000?"green":
spread>10000?"yellow":"red";

html+=`
<tr>
<td>${d.address}</td>
<td>${d.lead}</td>
<td>${d.stage}</td>
<td>$${d.purchase}</td>
<td>$${d.arv}</td>
<td>$${d.rehab}</td>
<td>$${total}</td>
<td>$${spread}</td>
<td class="${color}">${status}</td>
</tr>`;
});

pipe.innerHTML=html;
}

/* EMAIL ENGINE */
function buildEmail(type){

let totalDeals = deals.length;

let body = `RO'Lyfe Deal Report\n\n`;

deals.forEach(d=>{
body+=`
Address: ${d.address}
Purchase: ${d.purchase}
ARV: ${d.arv}
Rehab: ${d.rehab}
Spread: ${d.arv-(d.purchase+d.rehab)}
Stage: ${d.stage}
-------------------------
`;
});

if(type==="investor"){
return {
subject:"🔥 RO'Lyfe Investor Rehab Opportunities",
body
};
}

if(type==="lender"){
return {
subject:"🏦 RO'Lyfe Deal Packet Submission",
body
};
}

return {
subject:"📊 RO'Lyfe Internal Deal Report",
body
};
}

/* EMAIL BLAST (GITHUB SAFE) */
function emailBlast(type){

let e = buildEmail(type);

let mailto =
`mailto:?subject=${encodeURIComponent(e.subject)}&body=${encodeURIComponent(e.body)}`;

window.location.href = mailto;
}

/* RESET */
function resetAll(){
if(!confirm("Reset everything?")) return;
localStorage.removeItem("deals");
deals=[];
render();
}

/* JAMAL AI */
function toggleJamal(){
let box=jamalBox;
box.style.display=box.style.display==="flex"?"none":"flex";
box.style.flexDirection="column";
}

function askJamal(){

let q=msg.value.toLowerCase();
chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let reply="";

if(q.includes("deal")){
reply="Check spread. 30k+ = strong assignment potential.";
}
else if(q.includes("rehab")){
reply="Rehab control is profit control.";
}
else if(q.includes("email")){
reply="Use investor blast for buyers, lender pack for funding.";
}
else{
reply="I’m Jamal. Ask about deals, rehab, or funding logic.";
}

chat.innerHTML+=`<div><b>Jamal:</b> ${reply}</div>`;
msg.value="";
chat.scrollTop=chat.scrollHeight;
}

render();

</script>

</body>
</html>
