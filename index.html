<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Institutional Deal Desk OS v3.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
position:sticky;
top:0;
z-index:10;
background:#151925;
padding:12px;
text-align:center;
font-weight:bold;
font-size:14px;
}

.container{
display:flex;
flex-direction:column;
gap:12px;
padding:10px;
max-width:100%;
box-sizing:border-box;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
border:1px solid #2a3440;
overflow:hidden;
}

h3{
margin:6px 0;
color:#00d4ff;
font-size:14px;
}

/* SAFE MOBILE INPUTS */
input,select,button,textarea{
width:100%;
padding:10px;
margin:4px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
font-size:13px;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button.danger{background:#ff4d4d;color:#fff}

/* SAFE SCROLL TABLE */
.scroll{
overflow-x:auto;
width:100%;
}

table{
min-width:700px;
border-collapse:collapse;
font-size:10px;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.small{
font-size:11px;
opacity:0.85;
white-space:pre-wrap;
background:#0e141b;
padding:8px;
border-radius:8px;
}

/* REHAB LIST */
.rehabRow{
display:flex;
align-items:center;
gap:6px;
margin:4px 0;
font-size:12px;
}

.rehabRow span{
flex:1;
}

/* JAMAL */
#jamalBtn{
position:fixed;
bottom:15px;
right:15px;
width:52px;
height:52px;
border-radius:50%;
background:#00d4ff;
border:none;
font-size:18px;
z-index:999;
}

#jamalBox{
position:fixed;
bottom:75px;
right:15px;
width:280px;
height:320px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:11px;
}

#msg{
width:100%;
padding:8px;
border:none;
}

a{color:#6ee7c9;text-decoration:none}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v3.0 — FULL INSTITUTIONAL UNDERWRITING</header>

<div class="container">

<!-- APPLICATION GATE -->
<div class="card">
<h3>📥 Loan Application Gate (REQUIRED)</h3>

<a href="https://form.jotform.com/261416399941062" target="_blank">
<button>Open Loan Application</button>
</a>

<a href="https://form.jotform.com/253154859148062" target="_blank">
<button>Upload Documents</button>
</a>

<p class="small">No application = no underwriting review</p>
</div>

<!-- DEAL INPUT -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Direct</option>
</select>

<button onclick="buildLinks()">🔗 Property Links</button>

<div id="links" class="small"></div>
</div>

<!-- REHAB -->
<div class="card">
<h3>🛠 FULL COGO REHAB (VISIBLE + LOAN OFFICER READY)</h3>

<div id="rehab"></div>

<button onclick="calc()">Calculate Rehab</button>

<div id="rehabOut" class="small">No rehab selected</div>
</div>

<!-- STRATEGY -->
<div class="card">
<h3>📊 3-Tier Capital Stack</h3>

<button onclick="run()">Run Underwriting</button>

<div id="strategy" class="small"></div>
</div>

<!-- ACTIONS -->
<div class="card">
<h3>⚙️ Export</h3>

<button onclick="emailDeal()">📧 Email Deal</button>
<button onclick="pdf()">📄 PDF</button>
<button class="danger" onclick="location.reload()">RESET</button>
</div>

</div>

<!-- JAMAL AI -->
<button id="jamalBtn" onclick="toggle()">🤖</button>

<div id="jamalBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter')ask()">
</div>

<script>

/* FULL COGO LIST (VISIBLE UNDERWRITING) */
const items=[
["Roofing",12000],
["Kitchen",20000],
["Plumbing",18000],
["HVAC",13000],
["Windows",8000],
["Siding",8000],
["Demolition",0],
["Drywall",15000],
["Electrical",8000],
["Framing",15000],
["Flooring",15000],
["Painting",3000],
["Permit Fees",3000],
["Dumpster",2000],
["Fixtures",3000],
["Structural",15000],
["Lighting",1200],
["Water Heater",1300],
["Stairs",1000]
];

let selected=[];

/* BUILD UI */
function build(){
let html="";
items.forEach((i,index)=>{
html+=`
<div class="rehabRow">
<input type="checkbox" onchange="toggle(${index})">
<span>${i[0]}</span>
<input type="number" id="c${index}" value="${i[1]}">
</div>`;
});
rehab.innerHTML=html;
}
build();

/* TOGGLE */
function toggle(i){
if(selected.includes(i)){
selected=selected.filter(x=>x!==i);
}else{
selected.push(i);
}
}

/* CALC */
function calc(){
let total=0;
let report="";

selected.forEach(i=>{
let v=+document.getElementById("c"+i).value||0;
total+=v;
report+=items[i][0]+" — $"+v+"\n";
});

rehabOut.innerText=
"TOTAL REHAB: $"+total+"\n\n"+report;
}

/* LINKS */
function buildLinks(){
let a=encodeURIComponent(address.value);

links.innerHTML=`
<a target="_blank" href="https://www.redfin.com/search?q=${a}">Redfin</a> |
<a target="_blank" href="https://www.zillow.com/homes/${a}">Zillow</a> |
<a target="_blank" href="https://www.google.com/search?q=${a}">Google</a>
`;
}

/* UNDERWRITING */
function run(){
let p=+purchase.value||0;
let a=+arv.value||0;

let r=0;
selected.forEach(i=>{
r+=+document.getElementById("c"+i).value||0;
});

strategy.innerText=
`Cash (65%): $${(a*0.65).toFixed(0)}
Refi (70%): $${(a*0.70).toFixed(0)}
Seller (75%): $${(a*0.75).toFixed(0)}

All-in: $${(p+r)}
Spread: $${(a-(p+r))}`;
}

/* EMAIL */
function emailDeal(){
window.location.href=
`mailto:richman@rootoflyfe.com?subject=Deal Packet&body=${encodeURIComponent(rehabOut.innerText)}`;
}

/* PDF */
function pdf(){
let w=window.open();
w.document.write("<pre>"+rehabOut.innerText+"</pre>");
w.print();
}

/* JAMAL */
function toggle(){
jamalBox.style.display=
jamalBox.style.display==="flex"?"none":"flex";
jamalBox.style.flexDirection="column";
}

function ask(){
let q=msg.value.toLowerCase();
chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let r="Ask about deals, rehab, or spreads.";

if(q.includes("deal")) r="Check spread first. Then rehab accuracy.";
if(q.includes("rehab")) r="Rehab controls profit — never estimate blind.";
if(q.includes("money")) r="Money follows structure, not emotion.";

chat.innerHTML+=`<div><b>Jamal:</b> ${r}</div>`;
msg.value="";
chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
