<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Institutional Deal Desk OS v2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
position:sticky;
top:0;
background:#151925;
padding:14px;
text-align:center;
font-weight:bold;
z-index:10;
}

.container{
display:flex;
flex-direction:column;
gap:12px;
padding:12px;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
border:1px solid #2a3440;
}

h3{margin:6px 0;color:#00d4ff;font-size:14px}

input,select,button{
width:100%;
padding:10px;
margin:4px 0;
border-radius:6px;
border:none;
font-size:13px;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button.danger{background:#ff4d4d;color:#fff}

.scroll{overflow-x:auto}

table{
min-width:900px;
font-size:10px;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.green{color:#00ff99}
.yellow{color:#ffcc00}
.red{color:#ff4d4d}

.itemRow{
display:flex;
align-items:center;
gap:8px;
margin:4px 0;
font-size:12px;
}

.itemRow span{
flex:1;
}

.itemRow input{
width:90px;
}

.small{
font-size:11px;
opacity:0.7;
white-space:pre-wrap;
background:#0e141b;
padding:8px;
border-radius:8px;
}
</style>
</head>

<body>

<header>RO'Lyfe OS v2.0 — INSTITUTIONAL UNDERWRITING DESK</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="generateLinks()">🔗 Property Links</button>
<div id="links" class="small"></div>
</div>

<!-- REHAB -->
<div class="card">
<h3>🛠 FULL COGO REHAB (INSTITUTIONAL CHECKLIST)</h3>

<div id="rehabGrid"></div>

<button onclick="calcRehab()">Calculate Rehab</button>

<div class="small" id="rehabOut">No selection yet</div>
</div>

<!-- STRATEGY -->
<div class="card">
<h3>📊 Institutional Capital Stack (3-Tier)</h3>

<button onclick="runStrategy()">Run Underwriting</button>

<div id="strategy" class="small"></div>
</div>

<!-- ACTIONS -->
<div class="card">
<h3>⚙️ Export System</h3>

<button onclick="emailDeal()">📧 Email Deal Packet</button>
<button onclick="pdfDeal()">📄 Generate PDF</button>
<button class="danger" onclick="resetAll()">RESET DEAL</button>
</div>

</div>

<script>

/* =========================
   FULL COGO REHAB SYSTEM
========================= */

const rehabItems = [
["264","Architect",0],
["160","Asphalt & Paving",0],
["848","Basement",0],
["740","Bathroom Accessories / Mirror",0],
["840","Bathroom Tile",0],
["550","Bathroom Vanity & Countertop",0],
["841","Bedroom Hardware",0],
["352","Carpentry Rough",0],
["700","Carpets",0],
["418","Ceiling Work",0],
["752","Closet / Shelves",0],
["430","Concrete Material",0],
["384","Demolition",0],
["704","Drywall / Tape / Texture",15000],
["213","Dumpster",2000],
["354","Electrical Labor",8000],
["600","Exterior Doors",2500],
["710","Flooring",15000],
["536","Framing Labor",15000],
["650","HVAC",13000],
["712","Interior Painting",3000],
["842","Kitchen",20000],
["646","Lighting",1200],
["186","Permit Fees",3000],
["360","Plumbing Labor",18000],
["582","Roofing",12000],
["552","Siding",8000],
["614","Bath Fixtures",3000],
["750","Stairs / Railings",1000],
["510","Structural",15000],
["412","Water Heater",1300],
["618","Windows",8000]
];

let selected = [];

/* BUILD CHECKLIST */
function buildRehab(){
let html="";
rehabItems.forEach((r,i)=>{
html+=`
<div class="itemRow">
<input type="checkbox" onchange="toggle(${i})">
<span>${r[1]}</span>
<input id="c${i}" type="number" value="${r[2]}">
</div>`;
});
document.getElementById("rehabGrid").innerHTML=html;
}
buildRehab();

/* SELECT ITEMS */
function toggle(i){
if(selected.includes(i)){
selected = selected.filter(x=>x!==i);
}else{
selected.push(i);
}
}

/* CALC REHAB */
function calcRehab(){
let total=0;
let report="";

selected.forEach(i=>{
let val = parseFloat(document.getElementById("c"+i).value)||0;
total += val;
report += rehabItems[i][1]+" — $"+val+"\n";
});

rehabOut.innerText =
"TOTAL REHAB: $" + total + "\n\n" + report;

return total;
}

/* LINKS */
function generateLinks(){
let a = encodeURIComponent(address.value);

links.innerHTML = `
<a target="_blank" href="https://www.redfin.com/search?q=${a}">Redfin</a>
 | <a target="_blank" href="https://www.zillow.com/homes/${a}">Zillow</a>
 | <a target="_blank" href="https://www.google.com/search?q=${a}">Google</a>
`;
}

/* UNDERWRITING ENGINE */
function runStrategy(){

let p = +purchase.value||0;
let a = +arv.value||0;
let r = calcRehab();

strategy.innerText = `
CASH OFFER (65%): $${(a*0.65).toFixed(0)}
REFI (70%): $${(a*0.70).toFixed(0)}
SELLER FINANCE (75%): $${(a*0.75).toFixed(0)}

ALL-IN COST: $${(p+r)}
SPREAD: $${(a-(p+r))}
`;
}

/* EMAIL */
function emailDeal(){
let body = `
RO'LYFE INSTITUTIONAL DEAL PACKET

Address: ${address.value}
Purchase: ${purchase.value}
ARV: ${arv.value}

REHAB:
${rehabOut.innerText}

UNDERWRITING:
Cash: ${(arv.value*0.65)}
Refi: ${(arv.value*0.70)}
Seller: ${(arv.value*0.75)}
`;

window.location.href =
`mailto:richman@rootoflyfe.com?subject=Institutional Deal Packet&body=${encodeURIComponent(body)}`;
}

/* PDF */
function pdfDeal(){
let w = window.open();
w.document.write("<pre>"+rehabOut.innerText+"</pre>");
w.print();
}

/* RESET */
function resetAll(){
if(confirm("Reset deal?")){
location.reload();
}
}

</script>

</body>
</html>
