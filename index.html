<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f1115;color:#fff}
header{padding:14px;background:#151925;text-align:center;font-weight:bold;position:sticky;top:0}

.container{display:flex;flex-direction:column;gap:12px;padding:12px}

.card{background:#1b2130;padding:12px;border-radius:10px}

h3{color:#00d4ff;margin:6px 0}

input,select,button{
width:100%;padding:10px;margin:4px 0;border-radius:6px;border:none;font-size:13px
}

button{background:#00d4ff;font-weight:bold;cursor:pointer}

.small{font-size:11px;opacity:0.7}

.scroll{overflow-x:auto}

table{min-width:900px;font-size:10px;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #333;white-space:nowrap}

.green{color:#00ff99}
.yellow{color:#ffcc00}
.red{color:#ff4d4d}

.toggle{
display:flex;align-items:center;gap:10px;font-size:12px;margin-top:6px
}
</style>
</head>

<body>

<header>RO'Lyfe OS v1.6 — FULL COGO REHAB ENGINE</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<div class="toggle">
<input type="checkbox" id="bufferToggle">
<label>Apply 10% Rehab Buffer</label>
</div>

<button onclick="generateLinks()">🔗 Open Property Links</button>
<div id="links"></div>
</div>

<!-- REHAB ENGINE -->
<div class="card">
<h3>🛠 COGO Rehab Scope (FULL LIST)</h3>

<div id="rehabList"></div>

<button onclick="calcRehab()">Calculate Rehab</button>

<p><b>Total Rehab:</b> $<span id="total">0</span></p>

<div id="rehabExport" class="small"></div>

<button onclick="exportRehab()">📄 Export Rehab Scope</button>
<button onclick="emailRehab()">📧 Email Rehab</button>
<button onclick="downloadPDF()">⬇ PDF</button>

</div>

<!-- STRATEGY -->
<div class="card">
<h3>📊 3-Tier Strategy</h3>
<button onclick="runStrategy()">Run Analysis</button>
<div id="strategy"></div>
</div>

</div>

/* =========================
   BUILD UI
========================= */

let rehabTotal = 0;

function build(){
let html="";
rehabItems.forEach((r,i)=>{
html+=`
<div>
<small>${r[0]} — ${r[1]}</small>
<input type="number" id="r${i}" value="${r[2]}">
</div>`;
});
document.getElementById("rehabList").innerHTML=html;
}
build();

/* =========================
   CALCULATE REHAB
========================= */

function calcRehab(){
rehabTotal=0;

rehabItems.forEach((r,i)=>{
rehabTotal += parseFloat(document.getElementById("r"+i).value)||0;
});

let buffer = document.getElementById("bufferToggle").checked ? rehabTotal*0.1 : 0;

document.getElementById("total").innerText = rehabTotal + buffer;

return rehabTotal + buffer;
}

/* =========================
   PROPERTY LINKS
========================= */

function generateLinks(){
let a = encodeURIComponent(address.value);

links.innerHTML = `
<a target="_blank" href="https://www.redfin.com/search?q=${a}">Redfin</a> |
<a target="_blank" href="https://www.zillow.com/homes/${a}_rb/">Zillow</a> |
<a target="_blank" href="https://www.google.com/search?q=${a}">Google</a>
`;
}

/* =========================
   3 TIER STRATEGY
========================= */

function runStrategy(){

let p = parseFloat(purchase.value)||0;
let a = parseFloat(arv.value)||0;
let r = calcRehab();

strategy.innerHTML = `
Cash Offer (65% ARV): $${(a*0.65).toFixed(0)}<br>
Refi (70% ARV): $${(a*0.70).toFixed(0)}<br>
Seller Finance (75% ARV): $${(a*0.75).toFixed(0)}<br><br>

All-In Cost: ${(p+r).toFixed(0)}<br>
Spread: ${(a-(p+r)).toFixed(0)}
`;
}

/* =========================
   EXPORT REHAB
========================= */

function exportRehab(){
let text="RO'Lyfe COGO Rehab Scope\n\n";

rehabItems.forEach((r,i)=>{
let v=document.getElementById("r"+i).value;
if(v>0) text+=`${r[1]}: $${v}\n`;
});

rehabExport.innerText=text;
}

/* =========================
   EMAIL REHAB
========================= */

function emailRehab(){
let body=rehabExport.innerText;

window.location.href=
`mailto:richman@rootoflyfe.com?subject=COGO Rehab Scope&body=${encodeURIComponent(body)}`;
}

/* =========================
   PDF
========================= */

function downloadPDF(){
let w=window.open();
w.document.write(`<pre>${rehabExport.innerText}</pre>`);
w.print();
}
