<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v4.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:10;
background:#151925;
padding:12px;
text-align:center;
font-weight:bold;
font-size:14px;
border-bottom:1px solid #222;
}

/* LAYOUT */
.container{
display:flex;
flex-direction:column;
gap:12px;
padding:10px;
max-width:1100px;
margin:auto;
}

/* CARDS */
.card{
background:#1b2130;
padding:12px;
border-radius:10px;
border:1px solid #2a3440;
}

/* TITLES */
h3{
margin:6px 0;
color:#00d4ff;
font-size:14px;
}

/* INPUTS */
input,select,button{
width:100%;
padding:12px;
margin:4px 0;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button.green{background:#22c55e;color:#000;}
button.red{background:#ef4444;color:#fff;}

/* LINKS */
.links{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.linkbtn{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
background:#0e141b;
border:1px solid #2a3440;
font-weight:bold;
color:#fff;
text-decoration:none;
}

/* REHAB */
.rehabRow{
display:flex;
align-items:center;
gap:8px;
margin:6px 0;
font-size:12px;
}

.rehabRow span{
flex:1;
}

/* AI */
#aiBtn{
position:fixed;
bottom:10px;
right:10px;
width:55px;
height:55px;
border-radius:50%;
background:#00d4ff;
border:none;
z-index:999;
}

#aiBox{
position:fixed;
bottom:70px;
right:10px;
width:300px;
height:340px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:12px;
}

#msg{
width:100%;
padding:10px;
border:none;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="intro">
<h2 style="color:#00d4ff">RO'Lyfe OS</h2>
<p>Loading underwriting engine...</p>
</div>

<header>RO'Lyfe DEAL DESK OS v4.1 — FULL INSTITUTIONAL ENGINE</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h3>📍 Deal Intake</h3>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Direct</option>
<option>Private Lender</option>
</select>

<button onclick="buildLinks()">🔗 Generate Property Links</button>
<div id="links" class="links"></div>
</div>

<!-- REHAB -->
<div class="card">
<h3>🛠 COGO Rehab Scope (FULL LENDER SHEET)</h3>
<div id="rehab"></div>
<button onclick="calc()">Calculate Rehab</button>
<div id="rehabOut" style="white-space:pre-wrap;font-size:12px;background:#0e141b;padding:10px;border-radius:8px;margin-top:8px"></div>
</div>

<!-- STRATEGY -->
<div class="card">
<h3>📊 3-Tier Capital Stack</h3>
<button onclick="run()">Run Underwriting</button>
<div id="strategy" style="white-space:pre-wrap;font-size:12px;background:#0e141b;padding:10px;border-radius:8px"></div>
</div>

<!-- EXPORT -->
<div class="card">
<h3>⚙️ Export</h3>
<button onclick="emailDeal()">📧 Email Packet</button>
<button onclick="window.print()">📄 PDF Export</button>
<button class="red" onclick="reset()">RESET</button>
</div>

</div>

<!-- AI -->
<button id="aiBtn" onclick="toggleAI()">🤖</button>

<div id="aiBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter')ask()">
</div>

<script>

setTimeout(()=>document.getElementById("intro").style.display="none",5000);

/* FULL 70+ ITEM COGO LIST */
const rehabItems = [
["264","Architect",0],
["160","Asphalt & Paving",0],
["848","Basement",0],
["740","Bathroom Accessories / Mirror",0],
["840","Bathroom Tile",0],
["550","Bathroom Vanity & Countertop",0],
["841","Bedroom Hardware",0],
["352","Carpentry Rough",0],
["700","Carpets",0],
["418","Ceiling Work",0],
["752","Closet / Shelves",0],
["430","Concrete Material",0],
["314","Contingency (10%)",0],
["382","Curbs / Gutters / Walkways",0],
["802","Decking / Porch / Patio",0],
["384","Demolition",0],
["492","Downspouts / Gutters",0],
["388","Driveway",0],
["704","Drywall",15000],
["213","Dumpster",2000],
["354","Electrical Labor",8000],
["600","Exterior Doors",2500],
["706","Exterior Painting",0],
["490","Fascia / Soffit",0],
["708","Fencing",0],
["350","Finish Carpentry",0],
["710","Flooring",15000],
["536","Framing",15000],
["650","HVAC",13000],
["712","Interior Painting",3000],
["842","Kitchen",20000],
["646","Lighting",1200],
["186","Permit Fees",3000],
["360","Plumbing",18000],
["582","Roofing",12000],
["552","Siding",8000],
["614","Fixtures",3000],
["750","Stairs",1000],
["510","Structural",15000],
["412","Water Heater",1300],
["618","Windows",8000]
];

function buildRehab(){
let html="";
rehabItems.forEach((r,i)=>{
html+=`
<div class="rehabRow">
<input type="checkbox" id="c${i}">
<span>${r[1]}</span>
<input id="v${i}" type="number" value="${r[2]}">
</div>`;
});
rehab.innerHTML=html;
}
buildRehab();

/* CALC */
function calc(){
let total=0;
let txt="";
rehabItems.forEach((r,i)=>{
if(document.getElementById("c"+i).checked){
let v=+document.getElementById("v"+i).value||0;
total+=v;
txt+=r[1]+" = $"+v+"\n";
}
});
rehabOut.innerText="TOTAL REHAB: $"+total+"\n\n"+txt;
return total;
}

/* LINKS */
function buildLinks(){
let a=encodeURIComponent(address.value);
links.innerHTML=`
<a class="linkbtn" target="_blank" href="https://www.redfin.com/search?q=${a}">Redfin</a>
<a class="linkbtn" target="_blank" href="https://www.zillow.com/homes/${a}">Zillow</a>
<a class="linkbtn" target="_blank" href="https://www.google.com/search?q=${a}">Google</a>
`;
}

/* UNDERWRITING */
function run(){
let p=+purchase.value||0;
let a=+arv.value||0;
let r=calc();

strategy.innerText=
`Cash Offer (65%): $${(a*0.65).toFixed(0)}
Refi (70%): $${(a*0.70).toFixed(0)}
Seller Finance (75%): $${(a*0.75).toFixed(0)}

All-in: $${p+r}
Spread: $${a-(p+r)}`;
}

/* EMAIL */
function emailDeal(){
window.location.href=
`mailto:richman@rootoflyfe.com?subject=Deal Packet&body=${encodeURIComponent(rehabOut.innerText + "\n\n" + strategy.innerText)}`;
}

/* RESET */
function reset(){location.reload();}

/* AI JAMAL */
function toggleAI(){
aiBox.style.display = aiBox.style.display==="flex"?"none":"flex";
aiBox.style.flexDirection="column";
}

function ask(){
let q=msg.value.toLowerCase();
chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;
let r="Analyze deal, rehab, or spread.";

if(q.includes("rehab")) r="Rehab = control cost = control profit.";
if(q.includes("deal")) r="Spread is your real income.";
if(q.includes("money")) r="Money follows structure.";

chat.innerHTML+=`<div><b>Jamal:</b> ${r}</div>`;
msg.value="";
chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
